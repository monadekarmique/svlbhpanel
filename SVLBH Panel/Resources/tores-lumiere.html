function buildTorus(R, r, segU, segV) {
  const lines = [];
  for (let v = 0; v < segV; v++) {
    const phi = (v/segV)*Math.PI*2;
    const pts = [];
    for (let u = 0; u <= segU; u++) {
      const theta = (u/segU)*Math.PI*2;
      pts.push([(R+r*Math.cos(phi))*Math.cos(theta), r*Math.sin(phi), (R+r*Math.cos(phi))*Math.sin(theta)]);
    }
    lines.push(pts);
  }
  for (let u = 0; u < segU; u++) {
    const theta = (u/segU)*Math.PI*2;
    const pts = [];
    for (let v = 0; v <= segV; v++) {
      const phi = (v/segV)*Math.PI*2;
      pts.push([(R+r*Math.cos(phi))*Math.cos(theta), r*Math.sin(phi), (R+r*Math.cos(phi))*Math.sin(theta)]);
    }
    lines.push(pts);
  }
  return lines;
}

function project(x,y,z,ox,oy,oz,rotX,rotY,scaleXZ,scaleY,cx,cy) {
  const px=x+ox, py=y+oy, pz=z+oz;
  const x1=px*Math.cos(rotY)-pz*Math.sin(rotY), z1=px*Math.sin(rotY)+pz*Math.cos(rotY);
  const y2=py*Math.cos(rotX)-z1*Math.sin(rotX), z2=py*Math.sin(rotX)+z1*Math.cos(rotX);
  const fov=1400, p=fov/(fov+z2*0.10);
  return {sx:cx+x1*scaleXZ*p, sy:cy+y2*scaleY*p};
}

function drawTorus(ctx,lines,ox,oy,oz,rotX,rotY,scaleXZ,scaleY,cx,cy,color,isDragged) {
  ctx.save();
  ctx.strokeStyle=color; ctx.lineWidth=isDragged?3:2; ctx.globalAlpha=0.88;
  for (const pts of lines) {
    ctx.beginPath();
    let first=true;
    for (const [x,y,z] of pts) {
      const p=project(x,y,z,ox,oy,oz,rotX,rotY,scaleXZ,scaleY,cx,cy);
      first ? ctx.moveTo(p.sx,p.sy) : ctx.lineTo(p.sx,p.sy);
      first=false;
    }
    ctx.stroke();
  }
  ctx.restore();
}

function drawSilhouette(ctx,cx,cy,s) {
  ctx.save(); ctx.translate(cx,cy); ctx.fillStyle="#1a1a2e";
  const hCY=-3.5*s,shY=-2.4*s,wY=-0.2*s,hpY=0.8*s,knY=3.2*s,ftY=7.0*s,hw=0.38*s;
  ctx.beginPath(); ctx.arc(0,hCY,0.42*s,0,Math.PI*2); ctx.fill();
  ctx.fillRect(-0.10*s,hCY+0.40*s,0.20*s,0.45*s);
  ctx.beginPath(); ctx.moveTo(-0.38*s,shY); ctx.lineTo(-hw*0.88,wY); ctx.lineTo(-hw,hpY); ctx.lineTo(hw,hpY); ctx.lineTo(hw*0.88,wY); ctx.lineTo(0.38*s,shY); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-0.38*s,shY); ctx.quadraticCurveTo(-0.60*s,wY*0.5,-0.56*s,hpY*0.7); ctx.lineTo(-0.44*s,hpY*0.7); ctx.quadraticCurveTo(-0.48*s,wY*0.5,-0.26*s,shY); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0.38*s,shY); ctx.quadraticCurveTo(0.60*s,wY*0.5,0.56*s,hpY*0.7); ctx.lineTo(0.44*s,hpY*0.7); ctx.quadraticCurveTo(0.48*s,wY*0.5,0.26*s,shY); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-hw,hpY); ctx.lineTo(-hw*1.1,knY); ctx.lineTo(-hw*0.6,knY); ctx.lineTo(-hw*0.2,hpY); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-hw*1.1,knY); ctx.lineTo(-hw*1.0,ftY); ctx.lineTo(-hw*0.5,ftY); ctx.lineTo(-hw*0.6,knY); ctx.fill();
  ctx.beginPath(); ctx.moveTo(hw,hpY); ctx.lineTo(hw*1.1,knY); ctx.lineTo(hw*0.6,knY); ctx.lineTo(hw*0.2,hpY); ctx.fill();
  ctx.beginPath(); ctx.moveTo(hw*1.1,knY); ctx.lineTo(hw*1.0,ftY); ctx.lineTo(hw*0.5,ftY); ctx.lineTo(hw*0.6,knY); ctx.fill();
  ctx.fillStyle="#c9a870"; ctx.beginPath(); ctx.ellipse(0,hCY-0.04*s,0.28*s,0.20*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#9a7020"; ctx.beginPath(); ctx.arc(-0.09*s,hCY-0.06*s,0.11*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(0.09*s,hCY-0.06*s,0.11*s,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawYinYang(ctx,cx,cy,s,pulse) {
  ctx.save();
  const x=cx+0.06*s, y=cy-0.18*s, r=0.14*s*pulse;
  ctx.translate(x,y); ctx.globalAlpha=0.93;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle="#FFFDF9"; ctx.shadowColor="#C28D43"; ctx.shadowBlur=8; ctx.fill();
  ctx.beginPath(); ctx.arc(0,0,r,-Math.PI/2,Math.PI/2,true);
  ctx.fillStyle="#1a1a2e"; ctx.fill();
  ctx.beginPath(); ctx.arc(0,-r/2,r/4,0,Math.PI*2);
  ctx.fillStyle="#FFFDF9"; ctx.fill();
  ctx.beginPath(); ctx.arc(0,r/2,r/4,0,Math.PI*2);
  ctx.fillStyle="#1a1a2e"; ctx.fill();
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.strokeStyle="#C28D43"; ctx.lineWidth=1; ctx.globalAlpha=0.7; ctx.stroke();
  ctx.restore();
}

function contrastColor(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255>0.55 ? "#1a1a2e" : "#ffffff";
}

function SephirothTree() {
  const byId = {};
  SEPH.forEach(s=>{ byId[s.id]=s; });
  return (
    <svg width={100} height={163} viewBox="0 0 100 163" style={{opacity:0.88,filter:"drop-shadow(0 1px 4px rgba(0,0,0,0.18))"}}>
      {PATHS.map(([a,b],i)=>{
        const s=byId[a], t=byId[b];
        return <line key={i} x1={s.x} y1={s.y} x2={t.x} y2={t.y} stroke="rgba(194,141,67,0.30)" strokeWidth={0.8}/>;
      })}
      {[[1,6],[6,9],[9,10]].map(([a,b],i)=>{
        const s=byId[a], t=byId[b];
        return <line key={`m${i}`} x1={s.x} y1={s.y} x2={t.x} y2={t.y} stroke="rgba(194,141,67,0.55)" strokeWidth={1.2}/>;

      <line x1={DAATH.x} y1={DAATH.y} x2={byId[2].x} y2={byId[2].y} stroke="rgba(194,141,67,0.35)" strokeWidth={0.8} strokeDasharray="2,2"/>

        const r=s.id===6?6:4.5;

function ShapeCube({color}) {

      <polygon points="11,11 20,6.5 20,15.5 11,20" fill={color} opacity={0.16} stroke={color} strokeWidth={1}/>
    </svg>

}

function ShapeDodecahedron({color}) {
  const penta=(r,cx=11,cy=11,off=-90)=>Array.from({length:5},(_,i)=>{
    const a=(i*72+off)*Math.PI/180;
    return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
  }).join(" ");
  return (
    <svg width={22} height={22} viewBox="0 0 22 22">
      <circle cx={11} cy={11} r={10} fill="none" stroke={color} strokeWidth={0.4} opacity={0.3}/>
      <polygon points={penta(9.5)} fill={color} opacity={0.10} stroke={color} strokeWidth={1.1}/>
      <polygon points={penta(5.5,11,11,-54)} fill={color} opacity={0.08} stroke={color} strokeWidth={0.8}/>
      {Array.from({length:5},(_,i)=>{
        const a1=(i*72-90)*Math.PI/180, a2=(i*72-54)*Math.PI/180;
        return <line key={i}
          x1={11+9.5*Math.cos(a1)} y1={11+9.5*Math.sin(a1)}
          x2={11+5.5*Math.cos(a2)} y2={11+5.5*Math.sin(a2)}
          stroke={color} strokeWidth={0.6} opacity={0.55}/>;
      })}
      <circle cx={11} cy={11} r={1.5} fill={color} opacity={0.9}/>
    </svg>
  );
}

function ShapeIcosahedron({color}) {
  const ring=(r,n,off=0)=>Array.from({length:n},(_,i)=>{
    const a=(i*360/n+off)*Math.PI/180;
    return [11+r*Math.cos(a), 11+r*Math.sin(a)];
  });
  const outer=ring(9,5,-90);
  const inner=ring(4.5,5,-54);
  return (
    <svg width={22} height={22} viewBox="0 0 22 22">
      <circle cx={11} cy={11} r={10} fill="none" stroke={color} strokeWidth={0.4} opacity={0.3}/>
      <polygon points={outer.map(p=>p.join(",")).join(" ")} fill={color} opacity={0.10} stroke={color} strokeWidth={1}/>
      <polygon points={inner.map(p=>p.join(",")).join(" ")} fill={color} opacity={0.08} stroke={color} strokeWidth={0.8}/>
      {outer.map(([x1,y1],i)=>{
        const [x2,y2]=inner[i], [x3,y3]=inner[(i+4)%5];
        return <polygon key={i} points={`${x1},${y1} ${x2},${y2} ${x3},${y3}`}
          fill={color} opacity={0.08} stroke={color} strokeWidth={0.6}/>;
      })}
      {inner.map(([x1,y1],i)=>{
        const [x2,y2]=outer[(i+1)%5];
        return <line key={`e${i}`} x1={x1} y1={y1} x2={x2} y2={y2}
          stroke={color} strokeWidth={0.5} opacity={0.5}/>;
      })}
      <circle cx={11} cy={11} r={1.5} fill={color} opacity={0.9}/>
    </svg>
  );
}

function ShapeMerkabaSacred({color}) {
  const h=8.8;
  const up  =`11,${11-h} ${11+h*0.866},${11+h*0.5} ${11-h*0.866},${11+h*0.5}`;
  const dn  =`11,${11+h} ${11+h*0.866},${11-h*0.5} ${11-h*0.866},${11-h*0.5}`;
  const hex=Array.from({length:6},(_,i)=>{const a=i*60*Math.PI/180;return `${11+5*Math.cos(a)},${11+5*Math.sin(a)}`;}).join(" ");
  return (
    <svg width={22} height={22} viewBox="0 0 22 22">
      <circle cx={11} cy={11} r={10} fill="none" stroke={color} strokeWidth={0.4} opacity={0.3}/>
      <polygon points={up} fill={color} opacity={0.15} stroke={color} strokeWidth={1}/>
      <polygon points={dn} fill={color} opacity={0.15} stroke={color} strokeWidth={1}/>
      <polygon points={hex} fill="none" stroke={color} strokeWidth={0.8} opacity={0.7}/>
      {[[11,11-h],[11+h*0.866,11+h*0.5],[11-h*0.866,11+h*0.5]].map(([x,y],i)=>(
        <circle key={i} cx={x} cy={y} r={1.2} fill={color} opacity={0.7}/>
      ))}
      <circle cx={11} cy={11} r={1.8} fill={color} opacity={0.95}/>
    </svg>
  );
}

}

const DEFAULT_AME = {ox:0,oy:0,oz:0,R:0.40,r:0.50,segU:24,segV:11,color:"#f5e642",h:23};
const DEFAULT_MO  = {ox:0,oy:0,oz:0,R:2.0,r:1.2,segU:36,segV:16,color:"#8e44ad",h:66};
const SA_COLORS   = ["#e67e22","#e74c3c","#1abc9c","#3498db","#9b59b6"];
const SA_LABELS   = ["SA1","SA2","SA3","SA4","SA5"];
function makeSA(i){return{active:i===0,color:SA_COLORS[i],ox:0,oy:0,oz:0,R:1.2,r:0.85,segU:30,segV:10,h:52};}

function App() {
  const canvasRef = useRef();
  const animRef   = useRef({t:0});
  const dragRef   = useRef({dragging:null,dragStart:null,toreStart:null});

  const [ame,setAme]             = useState({...DEFAULT_AME});
  const [surAmes,setSurAmes]     = useState([0,1,2,3,4].map(makeSA));
  const [mo,setMo]               = useState({...DEFAULT_MO});
  const [rotX,setRotX]           = useState(0.38);
  const [rotY,setRotY]           = useState(0.0);
  const [silScale,setSilScale]   = useState(0.058);
  const [zoom,setZoom]           = useState(0.564);
  const [alignment,setAlignment] = useState(100);
  const [sla,setSla]             = useState(100);
  const [slsa,setSlsa]           = useState(100);
  const [slpmo,setSlpmo]         = useState(100);
  const [slm,setSlm]             = useState(100);
  const [tab,setTab]             = useState("ame");
  const [showShape,setShowShape] = useState(true);
  const [isAdmin,setIsAdmin]     = useState(false);
  const adminRef                 = useRef(0);

  const linesAme    = useRef([]);
  const linesSA     = useRef([null,null,null,null,null]);
  const linesMonade = useRef([]);
  const paramsRef   = useRef({});

  useEffect(()=>{ linesAme.current=buildTorus(ame.R,ame.r,Math.round(ame.segU),Math.round(ame.segV)); },[ame.R,ame.r,ame.segU,ame.segV]);
  useEffect(()=>{ linesMonade.current=buildTorus(mo.R,mo.r,Math.round(mo.segU),Math.round(mo.segV)); },[mo.R,mo.r,mo.segU,mo.segV]);
  useEffect(()=>{ surAmes.forEach((sa,i)=>{ if(sa.active) linesSA.current[i]=buildTorus(sa.R,sa.r,Math.round(sa.segU),Math.round(sa.segV)); }); },[surAmes]);

  paramsRef.current={ame,surAmes,mo,rotX,rotY};

  const updateSA=(i,patch)=>setSurAmes(prev=>prev.map((sa,j)=>j===i?{...sa,...patch}:sa));

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas) return;
    const ctx=canvas.getContext("2d");
    let raf;
    function render(){
      const W=canvas.width,H=canvas.height,cx=W/2,cy=H*0.50;
      animRef.current.t+=0.006;
      const {ame:a,surAmes:sas,mo:m,rotX:rX,rotY:rY}=paramsRef.current;
      const s=W*silScale*zoom, silH=10.5*s;
      const scaleXZ=(W*0.46)/(m.R+m.r)*zoom;
      const scaleY_ame=((a.h/100)*silH)/(2*a.r);
      const scaleY_mo=((m.h/100)*silH)/(2*m.r);
      ctx.clearRect(0,0,W,H);
      const bg=ctx.createRadialGradient(cx,H*0.38,0,cx,H*0.5,W*0.85);
      bg.addColorStop(0,"#ffffff"); bg.addColorStop(0.55,"#fdfaf7"); bg.addColorStop(1,"#f0e8de");
      ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
      drawTorus(ctx,linesMonade.current,m.ox,m.oy,m.oz,rX,rY,scaleXZ,scaleY_mo,cx,cy,m.color,dragRef.current.dragging==="monade");
      for(let i=4;i>=0;i--){
        const sa=sas[i]; if(!sa.active||!linesSA.current[i]) continue;
        const scaleY_sa=((sa.h/100)*silH)/(2*sa.r);
        drawTorus(ctx,linesSA.current[i],sa.ox,sa.oy,sa.oz,rX,rY,scaleXZ,scaleY_sa,cx,cy,sa.color,dragRef.current.dragging===`sa${i}`);
      }
      drawSilhouette(ctx,cx,cy,s);
      drawTorus(ctx,linesAme.current,a.ox,a.oy,a.oz,rX,rY,scaleXZ,scaleY_ame,cx,cy,a.color,dragRef.current.dragging==="ame");
      drawYinYang(ctx,cx,cy,s,1+Math.sin(animRef.current.t*5)*0.09);
      const dx=a.ox-m.ox,dy=a.oy-m.oy,dz=a.oz-m.oz;
      const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
      setAlignment(Math.max(0,Math.round(100-(dist/4.0)*100)));
      if(dist>0.08){
        const pa=project(0,0,0,a.ox,a.oy,a.oz,rX,rY,scaleXZ,scaleY_ame,cx,cy);
        const pm=project(0,0,0,m.ox,m.oy,m.oz,rX,rY,scaleXZ,scaleY_mo,cx,cy);
        ctx.save(); ctx.globalAlpha=0.22; ctx.strokeStyle=C.magenta; ctx.lineWidth=1.2; ctx.setLineDash([5,8]);
        ctx.beginPath(); ctx.moveTo(pa.sx,pa.sy); ctx.lineTo(pm.sx,pm.sy); ctx.stroke();
        ctx.setLineDash([]); ctx.restore();
      }
      raf=requestAnimationFrame(render);
    }
    render();
    return ()=>cancelAnimationFrame(raf);
  },[ame,surAmes,mo,rotX,rotY,silScale,zoom]);

  function screenToUnit(dxPx,dyPx){
    const canvas=canvasRef.current;
    const {mo:m}=paramsRef.current;
    const scaleXZ=(canvas.width*0.46)/(m.R+m.r)*zoom;
    return{du:dxPx/scaleXZ,dv:dyPx/scaleXZ};
  }

  function getHit(clientX,clientY){
    const canvas=canvasRef.current;
    const rect=canvas.getBoundingClientRect();
    const mx=(clientX-rect.left)*(canvas.width/rect.width);
    const my=(clientY-rect.top)*(canvas.height/rect.height);
    const {ame:a,surAmes:sas,mo:m,rotX,rotY}=paramsRef.current;
    const cx=canvas.width/2, cy=canvas.height*0.50;
    const scaleXZ=(canvas.width*0.46)/(m.R+m.r)*zoom;
    const s=canvas.width*silScale*zoom, silH=10.5*s;
    const scaleY_ame=((a.h/100)*silH)/(2*a.r);
    const pa=project(0,0,0,a.ox,a.oy,a.oz,rotX,rotY,scaleXZ,scaleY_ame,cx,cy);
    if(Math.sqrt((mx-pa.sx)**2+(my-pa.sy)**2) < scaleXZ*(a.R+a.r)*1.15) return{tore:"ame",mx,my};
    for(let i=0;i<5;i++){
      const sa=sas[i]; if(!sa.active||!linesSA.current[i]) continue;
      const scaleY_sa=((sa.h/100)*silH)/(2*sa.r);
      const ps=project(0,0,0,sa.ox,sa.oy,sa.oz,rotX,rotY,scaleXZ,scaleY_sa,cx,cy);
      if(Math.sqrt((mx-ps.sx)**2+(my-ps.sy)**2) < scaleXZ*(sa.R+sa.r)*1.10) return{tore:`sa${i}`,mx,my};
    }
    const scaleY_mo=((m.h/100)*silH)/(2*m.r);
    const pm=project(0,0,0,m.ox,m.oy,m.oz,rotX,rotY,scaleXZ,scaleY_mo,cx,cy);
    if(Math.sqrt((mx-pm.sx)**2+(my-pm.sy)**2) < scaleXZ*(m.R+m.r)*1.05) return{tore:"monade",mx,my};
    return null;
  }

  const onDown=useCallback((clientX,clientY)=>{
    const hit=getHit(clientX,clientY); if(!hit) return;
    const {ame:a,surAmes:sas,mo:m}=paramsRef.current;
    let start;
    if(hit.tore==="ame") start={x:a.ox,y:a.oy};
    else if(hit.tore==="monade") start={x:m.ox,y:m.oy};
    else { const i=parseInt(hit.tore.slice(2)); start={x:sas[i].ox,y:sas[i].oy}; }
    dragRef.current={dragging:hit.tore,dragStart:{x:hit.mx,y:hit.my},toreStart:start};
  },[zoom,silScale]);

  const onMove=useCallback((clientX,clientY)=>{
    const d=dragRef.current; if(!d.dragging) return;
    const canvas=canvasRef.current, rect=canvas.getBoundingClientRect();
    const mx=(clientX-rect.left)*(canvas.width/rect.width);
    const my=(clientY-rect.top)*(canvas.height/rect.height);
    const {du,dv}=screenToUnit(mx-d.dragStart.x,my-d.dragStart.y);
    if(d.dragging==="ame") setAme(a=>({...a,ox:d.toreStart.x+du,oy:d.toreStart.y+dv}));
    else if(d.dragging==="monade") setMo(m=>({...m,ox:d.toreStart.x+du,oy:d.toreStart.y+dv}));
    else { const i=parseInt(d.dragging.slice(2)); updateSA(i,{ox:d.toreStart.x+du,oy:d.toreStart.y+dv}); }
  },[zoom,silScale]);

  const onUp=useCallback(()=>{ dragRef.current.dragging=null; },[]);

  const reset=()=>{
    setAme(a=>({...a,ox:0,oy:0,oz:0}));
    setMo(m=>({...m,ox:0,oy:0,oz:0}));
    setSurAmes(prev=>prev.map(sa=>({...sa,ox:0,oy:0,oz:0})));
  };

  const alignColor=alignment>80?"#2e9e6b":alignment>50?"#c07830":"#c0392b";
  const alignMsg=alignment===100?"Flux de lumiere divine coherent.":alignment>75?"Legere deviation - tension subtile.":alignment>50?"Desalignement modere - noeud actif.":"Desalignement severe - fragmentation SLA.";
  const card={background:C.blanc,border:`1px solid ${C.or}33`,borderRadius:16,padding:"16px 18px",boxShadow:"0 2px 14px rgba(194,141,67,0.07)"};
  const isLight=(hex)=>{try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)/255>0.55;}catch{return false;}};
  const tabBtn=(id,col=C.magenta)=>({flex:1,padding:"8px 2px",border:"none",borderRadius:10,background:tab===id?col:"transparent",color:tab===id?(isLight(col)?"#660033":"#ffffff"):col,fontSize:11,fontWeight:600,cursor:"pointer"});
  const activeSAIndex=tab.startsWith("sa")?parseInt(tab.slice(2)):-1;
  const activeSA=activeSAIndex>=0?surAmes[activeSAIndex]:null;

  // --- URLs images ---
  const IMG_LEFT  = "https://vlbh.energy/wp-content/uploads/2026/01/Capture-decran-2025-06-28-a-08.36.51.png";
  const IMG_RIGHT = "https://vlbh.energy/wp-content/uploads/2025/12/cropped-LinkedIn-Company-Logo.png";
  const IMG_SHAMAN = "https://vlbh.energy/wp-content/uploads/2026/01/digital-shaman-vlbh.jpg";

  return (
    <div style={{minHeight:"100vh",background:C.sable,display:"flex",flexDirection:"column",alignItems:"center",padding:"18px 14px 40px",userSelect:"none"}}>

      <div style={{textAlign:"center",marginBottom:12}}>
        <div
          style={{fontSize:9,letterSpacing:4,color:C.or,marginBottom:4,cursor:"default",userSelect:"none"}}
          onClick={()=>{
            adminRef.current+=1;
            if(adminRef.current>=2){setIsAdmin(v=>!v);adminRef.current=0;}
          }}
        >VIBRATIONAL LIGHT BODY HEALING{isAdmin&&<span style={{marginLeft:8,fontSize:8,color:C.magenta,letterSpacing:1}}>&#x2699; ADMIN</span>}</div>
        <div style={{fontSize:18,color:C.magenta,letterSpacing:1}}>Champ Toroidal {"\u00B7"} hDOM</div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,width:"100%",maxWidth:860}}>
        <img src={IMG_LEFT}
          style={{width:64,height:64,objectFit:"contain",borderRadius:12,flexShrink:0}} alt=""/>
        <div style={{...card,flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:10,color:C.or,letterSpacing:2}}>ALIGNEMENT</div>
            <div style={{fontSize:24,color:alignColor,fontWeight:600}}>{alignment}%</div>
          </div>
          <div style={{height:7,background:"#f0e8e2",borderRadius:8,overflow:"hidden",marginBottom:6}}>
            <div style={{height:"100%",width:`${alignment}%`,background:alignColor,borderRadius:8,transition:"width 0.1s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontStyle:"italic",fontSize:12,color:"#999"}}>{alignMsg}</div>
            <button onClick={reset} style={{background:"transparent",border:`1.5px solid ${C.magenta}44`,color:C.magenta,borderRadius:20,padding:"5px 14px",fontSize:9,cursor:"pointer",whiteSpace:"nowrap"}}>{"\u2726"} Realigner</button>
          </div>
        </div>
        <img src={IMG_RIGHT}
          style={{width:64,height:64,objectFit:"contain",borderRadius:12,flexShrink:0}} alt=""/>
      </div>

      <div style={{position:"relative",marginBottom:14}}>
        <canvas ref={canvasRef} width={840} height={580}
          style={{borderRadius:20,display:"block",maxWidth:"100%",cursor:"grab"}}
          onMouseDown={e=>onDown(e.clientX,e.clientY)}
          onMouseMove={e=>onMove(e.clientX,e.clientY)}
          onMouseUp={onUp} onMouseLeave={onUp}
          onTouchStart={e=>{e.preventDefault();onDown(e.touches[0].clientX,e.touches[0].clientY);}}
          onTouchMove={e=>{e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);}}
          onTouchEnd={onUp}
        />
        {/* SLA / SLSA / SLM badges */}
        <div style={{position:"absolute",top:10,left:"50%",transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {[
              {key:"SLA",  val:sla,  color:"#2B5EA7"},
              {key:"SLSA", val:slsa, color:"#BD3482"},
              {key:"SLM",  val:slm,  color:"#C28D43"},
            ].map(({key,val,color})=>{
              const digits=String(Math.round(val)).length;
              const fs=digits<=2?15:digits===3?13:11;
              return (
                <div key={key} style={{background:"rgba(255,255,255,0.93)",border:`1.5px solid ${color}55`,borderRadius:10,padding:"4px 10px",display:"flex",flexDirection:"column",alignItems:"center",minWidth:54,boxShadow:`0 1px 6px ${color}22`}}>
                  <span style={{fontSize:8,color,letterSpacing:1.5,fontWeight:600,opacity:0.8}}>{key}</span>
                  <span style={{fontSize:fs,color,fontWeight:700,fontFamily:"monospace",lineHeight:1.2,transition:"font-size 0.15s"}}>{Math.round(val)}<span style={{fontSize:fs*0.7}}>%</span></span>
                </div>
              );
            })}
          </div>
        </div>

        {/* Labels top-right */}
        <div style={{position:"absolute",top:10,right:12,display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
          <div style={{background:ame.color,borderRadius:20,padding:"4px 11px",fontSize:10,color:contrastColor(ame.color),fontWeight:600}}>Hara {"\u00B7"} {ame.h}%</div>
          {surAmes.map((sa,i)=>sa.active&&(
            <div key={i} style={{background:sa.color,borderRadius:20,padding:"4px 11px",fontSize:10,color:contrastColor(sa.color),fontWeight:600}}>{SA_LABELS[i]} {"\u00B7"} {sa.h}%</div>
          ))}
          <div style={{background:mo.color,borderRadius:20,padding:"4px 11px",fontSize:10,color:contrastColor(mo.color),fontWeight:600}}>Monade {"\u00B7"} {mo.h}%</div>
        </div>

        {/* Sephiroth Tree overlay */}
        {(()=>{
          const nbSA = surAmes.filter(sa=>sa.active).length;
          const treeTop = 207 + nbSA * 28;
          return (
            <div style={{position:"absolute",top:treeTop,right:8,pointerEvents:"none",transition:"top 0.35s ease"}}>
              <SephirothTree/>
            </div>
          );
        })()}

        {/* Zoom controls */}
        <div style={{position:"absolute",top:10,left:12,display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.92)",border:`1px solid ${C.or}44`,borderRadius:20,padding:"5px 10px"}}>
          <button onClick={()=>setZoom(z=>Math.max(0.3,+(z-0.08).toFixed(2)))} style={{width:22,height:22,borderRadius:"50%",border:`1px solid ${C.or}55`,background:"transparent",color:C.or,fontSize:16,cursor:"pointer"}}>{"\u2212"}</button>
          <input type="range" min={0.3} max={1.1} step={0.01} value={zoom} onChange={e=>setZoom(parseFloat(e.target.value))} style={{width:80,accentColor:C.or}}/>
          <button onClick={()=>setZoom(z=>Math.min(1.1,+(z+0.08).toFixed(2)))} style={{width:22,height:22,borderRadius:"50%",border:`1px solid ${C.or}55`,background:"transparent",color:C.or,fontSize:16,cursor:"pointer"}}>+</button>
          <span style={{fontSize:9,color:C.or,minWidth:32,textAlign:"center"}}>{Math.round((zoom-0.3)/(1.1-0.3)*100)}%</span>
        </div>
      </div>

      <div style={{width:"100%",maxWidth:860,display:"grid",gridTemplateColumns:"1fr 420px 1fr",gap:12,alignItems:"start"}}>

        <div>
          <PanelConception/>
          <PanelRayons/>
          <PanelDettes/>
          <PanelScores sla={sla} slsa={slsa} slpmo={slpmo} slm={slm}/>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={card}>
            <div style={{display:"flex",gap:3,background:C.sable,borderRadius:12,padding:4,marginBottom:6}}>
              <button style={tabBtn("ame",ame.color)} onClick={()=>setTab("ame")}>Hara</button>
              <button style={tabBtn("monade",mo.color)} onClick={()=>setTab("monade")}>Monade</button>
              <button style={tabBtn("view","#27A7AF")} onClick={()=>setTab("view")}>Vue</button>
            </div>
            <div style={{display:"flex",gap:3,background:C.sable,borderRadius:12,padding:4,marginBottom:14}}>
              {surAmes.map((sa,i)=>(
                <button key={i} style={{...tabBtn(`sa${i}`,sa.color),opacity:sa.active?1:0.4}} onClick={()=>setTab(`sa${i}`)}>{SA_LABELS[i]}</button>
              ))}
            </div>

            {tab==="ame"&&<>
              <ResetBtn onClick={()=>setAme({...DEFAULT_AME})} color={ame.color}/>
              <ColorPicker label="COULEUR" value={ame.color} onChange={v=>setAme(a=>({...a,color:v}))}/>
              <AxisSliders label="L'AME" ox={ame.ox} oy={ame.oy} oz={ame.oz} setOx={v=>setAme(a=>({...a,ox:v}))} setOy={v=>setAme(a=>({...a,oy:v}))} setOz={v=>setAme(a=>({...a,oz:v}))} range={3.5}/>
              {isAdmin&&<>
              <button onClick={()=>setShowShape(v=>!v)} style={{width:"100%",background:"transparent",border:`1px solid ${C.magenta}30`,color:C.magenta,borderRadius:10,padding:"7px 12px",marginBottom:showShape?12:0,fontSize:9,cursor:"pointer",display:"flex",justifyContent:"space-between"}}>
                <span>HAUTEUR / RAYON / SEGMENTS</span><span>{showShape?"\u25B2":"\u25BC"}</span>
              </button>
              {showShape&&<>
                <Slider label="HAUTEUR %" value={ame.h} min={5} max={120} step={1} onChange={v=>setAme(a=>({...a,h:v}))} unit="%"/>
                <Slider label="RAYON MAJEUR R" value={ame.R} min={0.05} max={2.0} step={0.05} onChange={v=>setAme(a=>({...a,R:v}))}/>
                <Slider label="RAYON TUBE r" value={ame.r} min={0.05} max={2.0} step={0.05} onChange={v=>setAme(a=>({...a,r:v}))}/>
                <Slider label="SEGMENTS U" value={ame.segU} min={6} max={48} step={1} onChange={v=>setAme(a=>({...a,segU:v}))}/>
                <Slider label="SECTIONS V" value={ame.segV} min={3} max={16} step={1} onChange={v=>setAme(a=>({...a,segV:v}))}/>
              </>}
              </>}
            </>}

            {activeSAIndex>=0&&activeSA&&<>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"8px 12px",background:C.sable,borderRadius:10,border:`1px solid ${activeSA.color}44`}}>
                <span style={{fontSize:10,color:C.magenta,flex:1}}>{SA_LABELS[activeSAIndex]}</span>
                <button onClick={()=>updateSA(activeSAIndex,{active:!activeSA.active})} style={{padding:"5px 14px",borderRadius:20,border:`1.5px solid ${activeSA.color}`,background:activeSA.active?activeSA.color:"transparent",color:activeSA.active?"#fff":activeSA.color,fontSize:9,cursor:"pointer"}}>{activeSA.active?"ON":"OFF"}</button>
              </div>
              {activeSA.active&&<>
                <ResetBtn onClick={()=>updateSA(activeSAIndex,{...makeSA(activeSAIndex),active:true})} color={activeSA.color}/>
                <ColorPicker label="COULEUR" value={activeSA.color} onChange={v=>updateSA(activeSAIndex,{color:v})}/>
                <AxisSliders label={SA_LABELS[activeSAIndex]} ox={activeSA.ox} oy={activeSA.oy} oz={activeSA.oz} setOx={v=>updateSA(activeSAIndex,{ox:v})} setOy={v=>updateSA(activeSAIndex,{oy:v})} setOz={v=>updateSA(activeSAIndex,{oz:v})} range={3.5}/>
                {isAdmin&&<>
                <button onClick={()=>setShowShape(v=>!v)} style={{width:"100%",background:"transparent",border:`1px solid ${C.magenta}30`,color:C.magenta,borderRadius:10,padding:"7px 12px",marginBottom:showShape?12:0,fontSize:9,cursor:"pointer",display:"flex",justifyContent:"space-between"}}>
                  <span>HAUTEUR / RAYON / SEGMENTS</span><span>{showShape?"\u25B2":"\u25BC"}</span>
                </button>
                {showShape&&<>
                  <Slider label="HAUTEUR %" value={activeSA.h} min={5} max={130} step={1} onChange={v=>updateSA(activeSAIndex,{h:v})} unit="%"/>
                  <Slider label="RAYON MAJEUR R" value={activeSA.R} min={0.1} max={3.5} step={0.05} onChange={v=>updateSA(activeSAIndex,{R:v})}/>
                  <Slider label="RAYON TUBE r" value={activeSA.r} min={0.05} max={2.5} step={0.05} onChange={v=>updateSA(activeSAIndex,{r:v})}/>
                  <Slider label="SEGMENTS U" value={activeSA.segU} min={6} max={54} step={1} onChange={v=>updateSA(activeSAIndex,{segU:v})}/>
                  <Slider label="SECTIONS V" value={activeSA.segV} min={3} max={20} step={1} onChange={v=>updateSA(activeSAIndex,{segV:v})}/>
                </>}
                </>}
              </>}
            </>}

            {tab==="monade"&&<>
              <ResetBtn onClick={()=>setMo({...DEFAULT_MO})} color={mo.color}/>
              <ColorPicker label="COULEUR" value={mo.color} onChange={v=>setMo(m=>({...m,color:v}))}/>
              <AxisSliders label="MONADE" ox={mo.ox} oy={mo.oy} oz={mo.oz} setOx={v=>setMo(m=>({...m,ox:v}))} setOy={v=>setMo(m=>({...m,oy:v}))} setOz={v=>setMo(m=>({...m,oz:v}))} range={3.5}/>
              {isAdmin&&<>
              <button onClick={()=>setShowShape(v=>!v)} style={{width:"100%",background:"transparent",border:`1px solid ${C.magenta}30`,color:C.magenta,borderRadius:10,padding:"7px 12px",marginBottom:showShape?12:0,fontSize:9,cursor:"pointer",display:"flex",justifyContent:"space-between"}}>
                <span>HAUTEUR / RAYON / SEGMENTS</span><span>{showShape?"\u25B2":"\u25BC"}</span>
              </button>
              {showShape&&<>
                <Slider label="HAUTEUR %" value={mo.h} min={10} max={150} step={1} onChange={v=>setMo(m=>({...m,h:v}))} unit="%"/>
                <Slider label="RAYON MAJEUR R" value={mo.R} min={0.3} max={5.0} step={0.05} onChange={v=>setMo(m=>({...m,R:v}))}/>
                <Slider label="RAYON TUBE r" value={mo.r} min={0.1} max={3.5} step={0.05} onChange={v=>setMo(m=>({...m,r:v}))}/>
                <Slider label="SEGMENTS U" value={mo.segU} min={6} max={60} step={1} onChange={v=>setMo(m=>({...m,segU:v}))}/>
                <Slider label="SECTIONS V" value={mo.segV} min={3} max={24} step={1} onChange={v=>setMo(m=>({...m,segV:v}))}/>
              </>}
              </>}
            </>}

            {tab==="view"&&<>
              <Slider label="INCLINAISON X" value={rotX} min={0} max={1.2} step={0.01} onChange={setRotX} color="#27A7AF"/>
              {isAdmin&&<>
                <Slider label="ROTATION Y" value={rotY} min={-Math.PI} max={Math.PI} step={0.01} onChange={setRotY} color="#27A7AF"/>
                <Slider label="TAILLE BONHOMME" value={silScale} min={0.02} max={0.13} step={0.002} onChange={setSilScale} color="#27A7AF"/>
              </>}
            </>}
          </div>

          <div style={{...card,padding:"14px 18px"}}>
            <div style={{fontSize:10,color:C.or,letterSpacing:2,marginBottom:10}}>POSITIONS</div>
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr 1fr",gap:"7px 10px",alignItems:"center"}}>
              {[{icon:"H",color:ame.color,ox:ame.ox,oy:ame.oy,oz:ame.oz,label:"Ame"},
                ...surAmes.map((sa,i)=>sa.active?{icon:"S",color:sa.color,ox:sa.ox,oy:sa.oy,oz:sa.oz,label:SA_LABELS[i]}:null).filter(Boolean),
                {icon:"M",color:mo.color,ox:mo.ox,oy:mo.oy,oz:mo.oz,label:"Monade"}
              ].map((t,idx)=>(
                <React.Fragment key={idx}>
                  <span style={{background:t.color,color:contrastColor(t.color),fontSize:9,fontWeight:600,borderRadius:12,padding:"3px 9px",whiteSpace:"nowrap"}}>{t.icon} {t.label}</span>
                  <span style={{color:"#c0392b",fontFamily:"monospace",fontSize:11}}>X {t.ox>=0?"+":""}{t.ox.toFixed(2)}</span>
                  <span style={{color:"#27ae60",fontFamily:"monospace",fontSize:11}}>Y {t.oy>=0?"+":""}{t.oy.toFixed(2)}</span>
                  <span style={{color:C.bleu,fontFamily:"monospace",fontSize:11}}>Z {t.oz>=0?"+":""}{t.oz.toFixed(2)}</span>
                </React.Fragment>
              ))}
            </div>
          </div>

          {/* Digital Shaman image */}
          <div style={{...card,padding:0,overflow:"hidden",marginTop:0}}>
            <img
              src={IMG_SHAMAN}
              style={{width:"100%",display:"block",borderRadius:16,objectFit:"cover"}}
              alt="Digital Shaman - symbolic vibrational light body healing"
              onError={e=>{e.target.style.display="none";}}
            />
          </div>
        </div>

        <div>
          <PanelEmotions/>
          <PanelMondes/>
        </div>
      </div>

      <div style={{width:"100%",maxWidth:860,marginTop:18,background:C.magenta,borderRadius:14,padding:"14px 24px",textAlign:"center"}}>
        <div style={{fontStyle:"italic",fontSize:15,color:"#ffffff",lineHeight:1.6}}>
          Cet outil te permet de comprendre et visualiser comment liberer tes blessures interieures pour cheminer vers la paix interieure et transformer ta relation avec toi-meme et les autres.
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
